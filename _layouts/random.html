---
layout: default
---

<script>
  function linkToRandomBlogPost() {
    var allPosts = [
        {% for post in site.posts %}
        "{{ post.url | prepend: site.baseurl }}"{% unless forloop.last %},{% endunless %}
        {% endfor %}
    ];

    return allPosts[Math.floor(Math.random() * allPosts.length)];
  }

  location.replace(linkToRandomBlogPost())
</script>
